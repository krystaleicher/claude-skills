<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weekly Check-In</title>
  <style>
    body { font-family: Arial; background: #f0f0f0; }
    .form-wrap { background: white; padding: 15px; width: 480px; }
    h2 { color: #888; font-size: 13px; }
    .field { margin: 8px 0; }
    input[type=text], textarea { width: 100%; padding: 4px; font-size: 11px; }
    .mood-row { display: flex; gap: 3px; }
    .mood-btn { background: #eee; border: none; padding: 4px 8px; cursor: pointer; }
    .mood-btn.selected { background: #4a90e2; color: #fff; }
    button[type=submit] { background: #4a90e2; color: white; border: none; padding: 6px 12px; margin-top: 8px; cursor: pointer; font-size: 11px; }
    .hint { color: #767676; font-size: 9px; }
    fieldset { border: none; padding: 0; margin: 8px 0; }
    legend { font-family: Arial; font-size: inherit; padding: 0; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="form-wrap">
    <h2>WEEKLY CHECK-IN</h2>

    <form id="checkin-form">
      <fieldset>
        <legend>How are you feeling this week?</legend>
        <div class="mood-row">
          <button type="button" class="mood-btn" aria-label="Mood 1 – Very low" aria-pressed="false" onclick="selectMood(1)">1</button>
          <button type="button" class="mood-btn" aria-label="Mood 2 – Low" aria-pressed="false" onclick="selectMood(2)">2</button>
          <button type="button" class="mood-btn" aria-label="Mood 3 – Neutral" aria-pressed="false" onclick="selectMood(3)">3</button>
          <button type="button" class="mood-btn" aria-label="Mood 4 – Good" aria-pressed="false" onclick="selectMood(4)">4</button>
          <button type="button" class="mood-btn" aria-label="Mood 5 – Very high" aria-pressed="false" onclick="selectMood(5)">5</button>
        </div>
      </fieldset>

      <div class="field">
        <label for="top_win">Top win</label>
        <input type="text" id="top_win" placeholder="What went well?" aria-describedby="top-win-hint">
        <div class="hint" id="top-win-hint">max 500 chars</div>
      </div>

      <div class="field">
        <label for="biggest_challenge">Biggest challenge</label>
        <textarea id="biggest_challenge" rows="2" placeholder="What was hard?"></textarea>
      </div>

      <div class="field">
        <label for="commitment">Next week's commitment</label>
        <input type="text" id="commitment" placeholder="I will...">
      </div>

      <button type="submit" onclick="submitForm()">Submit</button>
    </form>
  </div>

  <script>
    let selectedMood = null;
    function selectMood(val) {
      selectedMood = val;
      document.querySelectorAll('.mood-btn').forEach((b, i) => {
        const selected = i + 1 === val;
        b.classList.toggle('selected', selected);
        b.setAttribute('aria-pressed', selected ? 'true' : 'false');
      });
    }
    function submitForm() {
      const data = {
        mood: selectedMood,
        top_win: document.getElementById('top_win').value,
        biggest_challenge: document.getElementById('biggest_challenge').value,
        commitment: document.getElementById('commitment').value,
      };
      console.log('submitting', data);
    }
  </script>
</body>
</html>
